name: Feature request
description: Suggest a focused product or developer improvement.
title: "[Feature]: "
labels: ["enhancement", "needs-triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user, driver, operator, or developer problem should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What should change?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Rider app
        - Driver app
        - Backend
        - Website
        - Docs
        - Tooling
        - Cross-cutting
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: textarea
    id: risk
    attributes:
      label: Risk or rollout notes
      description: Mention privacy, payment, safety, security, or operations impact.

