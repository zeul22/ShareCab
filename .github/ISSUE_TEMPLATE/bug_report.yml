name: Bug report
description: Report a reproducible ShareCab bug.
title: "[Bug]: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Do not include secrets, real user data, production tokens, or private vulnerability details.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is broken?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Rider app
        - Driver app
        - Backend
        - Website
        - Docs
        - Tooling
        - Unsure
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide the shortest reliable reproduction.
      placeholder: |
        1. Go to ...
        2. Tap ...
        3. See ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include OS, device/simulator, browser, Flutter, Node, or backend details if relevant.
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Redact tokens, phone numbers, emails, addresses, and user IDs.

