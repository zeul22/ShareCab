name: Deploy iOS

on:
  push:
    branches:
      - preprod
    paths:
      - "app/**"
      - ".github/workflows/deploy-ios.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy-ios:
    # Pinned for App Store Connect SDK requirements. Override XCODE_VERSION in
    # the mobile-deploy environment if GitHub's macOS image changes.
    runs-on: macos-15
    environment: mobile-deploy
    defaults:
      run:
        shell: bash
        working-directory: app
    env:
      IOS_TARGET: ${{ vars.IOS_TARGET || 'lib/main.dart' }}
      IOS_FLAVOR: ${{ vars.IOS_FLAVOR || '' }}
      IOS_BUNDLE_ID: ${{ vars.IOS_BUNDLE_ID || 'com.sharecab.app' }}
      IOS_EXPORT_METHOD: ${{ vars.IOS_EXPORT_METHOD || 'app-store' }}
      IOS_TEAM_ID: ${{ vars.IOS_TEAM_ID || 'JZVW649NG3' }}
      API_BASE_URL: ${{ vars.API_BASE_URL || 'https://sharecab-backend-bbxdisvagq-el.a.run.app' }}
      GOOGLE_MAPS_KEY: ${{ secrets.GOOGLE_MAPS_KEY || vars.GOOGLE_MAPS_KEY }}
      MSG91_WIDGET_ID: ${{ vars.MSG91_WIDGET_ID }}
      MSG91_WIDGET_AUTH_TOKEN: ${{ secrets.MSG91_WIDGET_AUTH_TOKEN || secrets.SENDOTP_AUTH_TOKEN }}
      ADMOB_REWARDED_AD_UNIT_IOS: ${{ vars.ADMOB_REWARDED_AD_UNIT_IOS }}
      APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
      APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
      APP_STORE_CONNECT_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
      IOS_DIST_CERT_P12_BASE64: ${{ secrets.IOS_DIST_CERT_P12_BASE64 }}
      IOS_DIST_CERT_PASSWORD: ${{ secrets.IOS_DIST_CERT_PASSWORD }}
      IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
      IOS_KEYCHAIN_PASSWORD: ${{ secrets.IOS_KEYCHAIN_PASSWORD }}
      FASTLANE_SKIP_UPDATE_CHECK: "1"
      FASTLANE_HIDE_CHANGELOG: "1"

    steps:
      - name: Enforce preprod branch
        if: github.ref != 'refs/heads/preprod'
        run: |
          echo "This workflow is restricted to the preprod branch."
          exit 1

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ vars.XCODE_VERSION || '26.0' }}

      - name: Verify Xcode and iOS SDK
        run: |
          set -euo pipefail
          xcodebuild -version
          xcrun --sdk iphoneos --show-sdk-version
          xcrun --sdk iphoneos --show-sdk-path

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ vars.FLUTTER_VERSION || '3.41.7' }}
          cache: true

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true
          working-directory: app

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Install iOS signing assets
        run: |
          set -euo pipefail

          CERT_PATH="$RUNNER_TEMP/dist-cert.p12"
          PROFILE_PATH="$RUNNER_TEMP/profile.mobileprovision"
          PROFILE_PLIST="$RUNNER_TEMP/profile.plist"
          KEYCHAIN_PATH="$RUNNER_TEMP/ci-signing.keychain-db"
          PROFILE_DEST="$HOME/Library/MobileDevice/Provisioning Profiles"

          printf '%s' "$IOS_DIST_CERT_P12_BASE64" | base64 --decode > "$CERT_PATH" 2>/dev/null || \
            printf '%s' "$IOS_DIST_CERT_P12_BASE64" | base64 -D -o "$CERT_PATH"

          printf '%s' "$IOS_PROVISIONING_PROFILE_BASE64" | base64 --decode > "$PROFILE_PATH" 2>/dev/null || \
            printf '%s' "$IOS_PROVISIONING_PROFILE_BASE64" | base64 -D -o "$PROFILE_PATH"

          security create-keychain -p "$IOS_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$IOS_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" \
            -P "$IOS_DIST_CERT_PASSWORD" \
            -A \
            -t cert \
            -f pkcs12 \
            -k "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db
          security set-key-partition-list -S apple-tool:,apple: -s -k "$IOS_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          mkdir -p "$PROFILE_DEST"
          security cms -D -i "$PROFILE_PATH" > "$PROFILE_PLIST"
          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c 'Print UUID' "$PROFILE_PLIST")
          PROFILE_NAME=$(/usr/libexec/PlistBuddy -c 'Print Name' "$PROFILE_PLIST")
          PROFILE_APP_ID=$(/usr/libexec/PlistBuddy -c 'Print Entitlements:application-identifier' "$PROFILE_PLIST")

          if [[ "$PROFILE_APP_ID" != *"$IOS_BUNDLE_ID" ]]; then
            echo "Provisioning profile app identifier does not match bundle id."
            echo "Expected suffix: $IOS_BUNDLE_ID"
            echo "Actual profile app identifier: $PROFILE_APP_ID"
            exit 1
          fi

          cp "$PROFILE_PATH" "$PROFILE_DEST/$PROFILE_UUID.mobileprovision"

          {
            echo "PROFILE_UUID=$PROFILE_UUID"
            echo "PROFILE_NAME=$PROFILE_NAME"
          } >> "$GITHUB_ENV"

      - name: Apply iOS signing configuration to project
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          import os
          import re

          project_path = Path("ios/Runner.xcodeproj/project.pbxproj")
          text = project_path.read_text()

          team_id = os.environ["IOS_TEAM_ID"]
          profile_name = os.environ["PROFILE_NAME"]
          bundle_id = os.environ["IOS_BUNDLE_ID"]
          google_maps_key = os.environ.get("GOOGLE_MAPS_KEY", "")

          def q(value: str) -> str:
              return '"' + value.replace("\\", "\\\\").replace('"', '\\"') + '"'

          def upsert(block: str, key: str, value: str) -> str:
              escaped = re.escape(key)
              pattern = rf'(\n\t\t\t\t{escaped} = )[^;\n]+;'
              replacement = rf'\1{value};'
              if re.search(pattern, block):
                  return re.sub(pattern, replacement, block)
              return block.replace("buildSettings = {\n", f"buildSettings = {{\n\t\t\t\t{key} = {value};\n", 1)

          def patch_block(match: re.Match[str]) -> str:
              block = match.group(0)
              if f"PRODUCT_BUNDLE_IDENTIFIER = {bundle_id};" not in block:
                  return block

              block = upsert(block, "DEVELOPMENT_TEAM", team_id)
              block = upsert(block, "CODE_SIGN_STYLE", "Manual")
              block = upsert(block, "CODE_SIGN_IDENTITY", q("Apple Distribution"))
              block = upsert(block, '"CODE_SIGN_IDENTITY[sdk=iphoneos*]"', q("Apple Distribution"))
              block = upsert(block, "PROVISIONING_PROFILE_SPECIFIER", q(profile_name))
              if google_maps_key:
                  block = upsert(block, "GOOGLE_MAPS_KEY", q(google_maps_key))
              return block

          text = re.sub(r'buildSettings = \{.*?\n\t\t\t\};', patch_block, text, flags=re.S)
          project_path.write_text(text)
          PY

      - name: Install CocoaPods dependencies
        working-directory: app/ios
        run: pod install

      - name: Build signed IPA
        run: |
          set -euo pipefail

          FLUTTER_ARGS=(
            build ipa
            -t "$IOS_TARGET"
            --export-method "$IOS_EXPORT_METHOD"
            --build-number "$GITHUB_RUN_NUMBER"
            --dart-define="API_BASE_URL=$API_BASE_URL"
          )

          add_dart_define() {
            local name="$1"
            local value="$2"
            if [[ -n "$value" ]]; then
              FLUTTER_ARGS+=(--dart-define="$name=$value")
            fi
          }

          add_dart_define "GOOGLE_MAPS_KEY" "$GOOGLE_MAPS_KEY"
          add_dart_define "MSG91_WIDGET_ID" "$MSG91_WIDGET_ID"
          add_dart_define "MSG91_WIDGET_AUTH_TOKEN" "$MSG91_WIDGET_AUTH_TOKEN"
          add_dart_define "ADMOB_REWARDED_AD_UNIT_IOS" "$ADMOB_REWARDED_AD_UNIT_IOS"

          if [[ -n "$IOS_FLAVOR" ]]; then
            FLUTTER_ARGS+=(--flavor "$IOS_FLAVOR")
          fi

          flutter "${FLUTTER_ARGS[@]}"

      - name: Export IPA from xcarchive
        run: |
          set -euo pipefail
          EXPORT_PATH="$PWD/build/ios/ipa"
          EXPORT_OPTIONS_PLIST="$RUNNER_TEMP/ExportOptions.plist"

          ARCHIVE_PATH="$(find "$PWD/build/ios/archive" -maxdepth 2 -name '*.xcarchive' | head -n 1 || true)"
          if [[ -z "$ARCHIVE_PATH" ]]; then
            echo "No .xcarchive found under $PWD/build/ios/archive"
            find "$PWD/build/ios" -maxdepth 5 -type d | sort || true
            exit 1
          fi
          echo "Using archive: $ARCHIVE_PATH"

          mkdir -p "$EXPORT_PATH"

          cat > "$EXPORT_OPTIONS_PLIST" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>$IOS_EXPORT_METHOD</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>teamID</key>
            <string>$IOS_TEAM_ID</string>
            <key>signingCertificate</key>
            <string>Apple Distribution</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>$IOS_BUNDLE_ID</key>
              <string>$PROFILE_NAME</string>
            </dict>
            <key>stripSwiftSymbols</key>
            <true/>
            <key>uploadSymbols</key>
            <true/>
          </dict>
          </plist>
          EOF

          xcodebuild -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportPath "$EXPORT_PATH" \
            -exportOptionsPlist "$EXPORT_OPTIONS_PLIST"

      - name: Resolve built IPA path
        run: |
          set -euo pipefail
          IPA_PATH="$(find "$PWD/build/ios/ipa" -maxdepth 1 -name '*.ipa' | head -n 1 || true)"
          if [[ -z "$IPA_PATH" ]]; then
            echo "No IPA was found under $PWD/build/ios/ipa"
            if [[ -d "$PWD/build/ios" ]]; then
              find "$PWD/build/ios" -maxdepth 3 -type f | sort
            fi
            exit 1
          fi
          echo "IOS_IPA_PATH=$IPA_PATH" >> "$GITHUB_ENV"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: sharecab-ios-ipa
          path: app/build/ios/ipa/*.ipa
          if-no-files-found: error

      - name: Prepare App Store Connect API key file
        run: |
          set -euo pipefail
          KEY_PATH="$RUNNER_TEMP/app-store-connect-key.p8"
          KEY_CONTENT="$APP_STORE_CONNECT_PRIVATE_KEY"
          KEY_CONTENT="${KEY_CONTENT//\\n/$'\n'}"
          KEY_CONTENT="${KEY_CONTENT//$'\r'/}"
          if [[ "$KEY_CONTENT" == \"*\" && "$KEY_CONTENT" == *\" ]]; then
            KEY_CONTENT="${KEY_CONTENT:1:${#KEY_CONTENT}-2}"
          fi
          printf '%s\n' "$KEY_CONTENT" > "$KEY_PATH"
          echo "APP_STORE_CONNECT_KEY_PATH=$KEY_PATH" >> "$GITHUB_ENV"

      - name: Upload to TestFlight
        run: bundle exec fastlane ios beta
