name: sharecab_driver
description: ShareCab Driver — go online, accept rides, earn.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.2
  shared_preferences: ^2.3.2
  provider: ^6.1.2
  intl: ^0.20.2
  geolocator: ^12.0.0
  google_maps_flutter: ^2.7.0
  flutter_polyline_points: ^2.0.0
  image_picker: ^1.1.2
  # MSG91 OTP widget SDK — same flow as the rider app. The widget runs
  # the OTP exchange client-side and returns an access token, which the
  # driver app trades at the backend for a session JWT.
  sendotp_flutter_sdk: ^0.0.2
  # Razorpay checkout for the ₹499/mo driver subscription. The /subscribe
  # + /subscribe/confirm endpoints already exist on the backend.
  razorpay_flutter: ^1.3.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true
  assets:
    - assets/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/appIcon.png"
  remove_alpha_ios: true
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/appIcon.png"
