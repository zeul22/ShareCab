name: sharecab
description: ShareCab — share the cab, split the fare. Cab-sharing for short-distance city trips.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.2
  shared_preferences: ^2.3.2
  provider: ^6.1.2
  intl: ^0.19.0
  socket_io_client: ^2.0.3+1
  geolocator: ^12.0.0
  google_maps_flutter: ^2.7.0
  flutter_polyline_points: ^2.0.0
  # Foreground / background system notifications (NOT push). When the app is
  # fully killed, no Dart code runs to fire these — that case needs FCM.
  # See docs/notifications.md for the FCM upgrade path.
  flutter_local_notifications: ^17.2.2

dev_dependencies:
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
