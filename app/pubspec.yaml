name: sharecab
description: ShareCab — share the cab, split the fare. Cab-sharing for short-distance city trips.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.2
  shared_preferences: ^2.3.2
  provider: ^6.1.2
  intl: ^0.19.0
  socket_io_client: ^2.0.3+1
  geolocator: ^12.0.0
  google_maps_flutter: ^2.7.0
  flutter_polyline_points: ^2.0.0
  # Foreground / background system notifications (NOT push). When the app is
  # fully killed, no Dart code runs to fire these — that case needs FCM.
  # See docs/notifications.md for the FCM upgrade path.
  flutter_local_notifications: ^17.2.2
  # Razorpay checkout (driver subscription renewal + future rider unlock
  # purchases). When the backend is in stub mode (no Razorpay keys), the
  # app skips the checkout sheet and confirms with a fake paymentRef.
  razorpay_flutter: ^1.3.7
  # MSG91 OTP widget SDK. Sends + verifies the OTP entirely client-side;
  # the resulting JWT-style access token is then exchanged at our
  # `/auth/otp/msg91/verify` endpoint, which validates it via MSG91's
  # verify-access-token API and issues our own session.
  sendotp_flutter_sdk: ^0.0.2
  # AdMob rewarded video — the "watch 2 ads to unlock matching" path.
  # Single ad unit shown post-match (rider-only mode). Dev defaults
  # to AdMob's official test ad unit IDs; production IDs come in via
  # --dart-define so the binary itself stays test-friendly.
  google_mobile_ads: ^5.2.0

dev_dependencies:
  flutter_lints: ^4.0.0
  # Generates iOS + Android launcher icons (every required size /
  # density) from a single 1024+ px source. Run on demand:
  #   dart run flutter_launcher_icons
  # We don't run it in CI — it mutates native iOS/Android directories
  # and the generated assets are committed alongside the source PNG.
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true
  assets:
    - assets/

# Launcher icon generation. Source is the square ShareCab mark; both
# platforms get a clean export of every mip- / density-bucket they need.
# `remove_alpha_ios: true` is mandatory — Apple rejects icons with an
# alpha channel at submission, and our source PNG is technically RGB
# but flutter_launcher_icons can't tell without the explicit flag.
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/appIcon.png"
  remove_alpha_ios: true
  # Adaptive icon for Android 8+: white background, foreground is the
  # same square mark (the system masks it to whatever shape the OEM
  # wants — circle, squircle, etc.).
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/appIcon.png"
